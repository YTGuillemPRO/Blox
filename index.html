<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox - Crea tu aventura</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --rb-blue: #0078D7;
            --rb-blue-light: #00A2FF;
            --rb-blue-dark: #005FB8;
            --rb-bg-dark: #2C2C2C;
            --rb-bg-darker: #191919;
            --rb-bg-medium: #3C3C3C;
            --rb-text: #FFFFFF;
            --rb-gray: #B8B8B8;
            --rb-robux: #4CD964;
            --rb-red: #D63D3D;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Source Sans Pro', Arial, sans-serif;
            background: #6b9bd1;
            color: white;
            user-select: none;
        }

        /* === 3D GAME === */
        #game-container {
            position: fixed;
            inset: 56px 0 0 0;
            z-index: 1;
        }
        canvas { display: block; }

        /* === TOP BAR === */
        .rb-topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: rgba(25, 25, 25, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 10px;
            z-index: 200;
        }
        .rb-hamburger {
            width: 40px; height: 40px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .rb-hamburger:hover { background: rgba(255,255,255,0.08); }
        .rb-hamburger span {
            width: 20px; height: 2.5px;
            background: white;
            border-radius: 2px;
            transition: 0.2s;
        }
        .rb-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .rb-hamburger.open span:nth-child(2) { opacity: 0; }
        .rb-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        .rb-logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .rb-logo:hover { background: rgba(255,255,255,0.08); }
        .rb-search {
            flex-grow: 1;
            max-width: 560px;
            height: 38px;
            background: rgba(255,255,255,0.95);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 10px;
            color: #666;
        }
        .rb-search input {
            flex-grow: 1;
            border: none;
            outline: none;
            background: transparent;
            font: 500 15px 'Source Sans Pro';
            color: #333;
        }
        .rb-topbar-right {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
        }
        .rb-robux {
            background: rgba(0,0,0,0.4);
            border-radius: 18px;
            padding: 5px 14px;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .rb-robux:hover { background: rgba(0,0,0,0.6); }
        .rb-robux .r$ { color: var(--rb-robux); font-weight: 800; }
        .rb-icon-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            position: relative;
        }
        .rb-icon-btn:hover { background: rgba(255,255,255,0.08); }
        .rb-icon-btn .badge {
            position: absolute;
            top: 4px; right: 4px;
            background: #ff4d4d;
            color: white;
            font-size: 10px;
            font-weight: 700;
            width: 16px; height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--rb-bg-darker);
        }
        .rb-profile {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f2c280, #c18b5d);
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
            font-size: 15px;
            color: #5a3a1a;
        }

        /* === SIDEBAR === */
        .rb-sidebar {
            position: fixed;
            top: 56px;
            left: 0;
            bottom: 0;
            width: 220px;
            background: rgba(20, 20, 20, 0.96);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            z-index: 150;
            padding: 16px 8px;
            border-right: 1px solid rgba(0,0,0,0.6);
            overflow-y: auto;
        }
        .rb-sidebar.open { transform: translateX(0); }
        .sb-title {
            text-transform: uppercase;
            font-size: 11px;
            color: var(--rb-gray);
            letter-spacing: 1px;
            padding: 0 14px 8px;
            margin-top: 4px;
        }
        .sb-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font: 600 14px 'Source Sans Pro';
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 2px;
        }
        .sb-item:hover { background: rgba(255,255,255,0.07); }
        .sb-item .ic { font-size: 18px; width: 22px; text-align: center; }

        /* === IN-GAME UI === */
        .game-ui {
            position: fixed;
            top: 56px; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 100;
        }
        .rb-menu-btn {
            position: absolute;
            top: 14px;
            left: 14px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font: 700 13px 'Source Sans Pro';
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
        }
        .rb-menu-btn:hover { background: rgba(40, 40, 40, 0.95); }

        .game-menu {
            position: absolute;
            top: 56px;
            left: 14px;
            width: 220px;
            background: rgba(20, 20, 20, 0.96);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 6px;
            display: none;
            pointer-events: auto;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
        }
        .game-menu.open { display: block; }
        .gm-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 14px;
            background: transparent;
            border: none;
            color: white;
            font: 600 14px 'Source Sans Pro';
            text-align: left;
            border-radius: 6px;
            cursor: pointer;
        }
        .gm-item:hover { background: rgba(255,255,255,0.08); }
        .gm-item.danger { color: var(--rb-red); }
        .gm-item .ic { width: 18px; text-align: center; }
        .gm-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 8px; }

        .game-title {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 7px 20px;
            border-radius: 20px;
            font: 700 14px 'Source Sans Pro';
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .game-title .ping {
            font-size: 11px;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .game-title .ping::before {
            content: '';
            display: block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #4cd964;
        }

        .players-panel {
            position: absolute;
            top: 14px;
            right: 14px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }
        .players-toggle {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font: 700 13px 'Source Sans Pro';
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .players-toggle .count {
            background: rgba(255,255,255,0.15);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }
        .players-toggle:hover { background: rgba(40, 40, 40, 0.95); }
        .players-list {
            background: rgba(20, 20, 20, 0.94);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            width: 240px;
            overflow: hidden;
            display: none;
            box-shadow: 0 10px 24px rgba(0,0,0,0.4);
        }
        .players-list.open { display: block; }
        .players-list .pl-header {
            padding: 8px 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.3);
            color: var(--rb-gray);
        }
        .player-item {
            padding: 8px 12px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .player-item:last-child { border-bottom: none; }
        .player-item .dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid var(--rb-blue-light);
        }
        .player-item .name { flex-grow: 1; }
        .player-item .money { color: var(--rb-robux); font-weight: 700; font-size: 12px; }

        .chat-container {
            position: absolute;
            bottom: 14px;
            left: 14px;
            pointer-events: auto;
        }
        .chat-toggle {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 9px 16px;
            border-radius: 8px;
            font: 700 13px 'Source Sans Pro';
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-toggle:hover { background: rgba(40, 40, 40, 0.95); }
        .chat-window {
            display: none;
            width: 380px;
            height: 240px;
            background: rgba(20, 20, 20, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            margin-bottom: 6px;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 28px rgba(0,0,0,0.5);
        }
        .chat-container.open .chat-window { display: flex; }
        .chat-container.open .chat-toggle { display: none; }
        .chat-header {
            background: linear-gradient(to bottom, rgba(0,120,215,0.5), rgba(0,95,184,0.5));
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header .close-btn {
            cursor: pointer;
            opacity: 0.7;
            font-size: 18px;
            background: none;
            border: none;
            color: white;
            padding: 0 4px;
        }
        .chat-header .close-btn:hover { opacity: 1; }
        .chat-messages {
            flex-grow: 1;
            padding: 8px 12px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.4;
        }
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        .chat-input {
            border: none;
            border-top: 1px solid rgba(0,0,0,0.4);
            background: rgba(255,255,255,0.95);
            color: #222;
            padding: 10px 12px;
            font: 14px 'Source Sans Pro';
            outline: none;
        }
        .chat-input:focus { background: white; }

        .health-container {
            position: absolute;
            bottom: 14px;
            right: 14px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            pointer-events: auto;
        }
        .health-bar-bg {
            width: 240px;
            height: 32px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #000;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .health-bar {
            height: 100%;
            background: linear-gradient(to bottom, #00e08a 0%, #00b06f 60%, #008c58 100%);
            transition: width 0.25s ease-out, background 0.2s;
        }
        .health-label {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font: 700 13px 'Source Sans Pro';
            text-shadow: 0 1px 0 rgba(0,0,0,0.7);
        }
        .respawn-btn {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 7px 16px;
            border-radius: 8px;
            font: 700 12px 'Source Sans Pro';
            cursor: pointer;
        }
        .respawn-btn:hover { background: rgba(40, 40, 40, 0.95); }

        .backpack-btn {
            position: absolute;
            bottom: 270px;
            left: 14px;
            width: 54px;
            height: 54px;
            background: rgba(20, 20, 20, 0.85);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 2px;
            padding: 5px;
            cursor: pointer;
            pointer-events: auto;
        }
        .backpack-btn:hover { background: rgba(40, 40, 40, 0.95); }
        .backpack-btn .slot {
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
        }
        .backpack-btn .slot.filled {
            background: linear-gradient(135deg, #4cd964, #00b06f);
        }

        .help-hint {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 7px 14px;
            border-radius: 18px;
            font-size: 12px;
            color: var(--rb-gray);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .help-hint.show { opacity: 1; }
        .help-hint kbd {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 3px;
            padding: 1px 5px;
            font-family: monospace;
            font-size: 11px;
        }

        /* === DISCOVER OVERLAY === */
        .discover-overlay {
            position: fixed;
            top: 56px;
            left: 0; right: 0; bottom: 0;
            background: #191919;
            z-index: 300;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            overflow-y: auto;
            pointer-events: auto;
        }
        .discover-overlay.open { transform: translateY(0); }
        .discover-overlay::-webkit-scrollbar { width: 8px; }
        .discover-overlay::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        .discover-header {
            position: sticky;
            top: 0;
            background: rgba(25, 25, 25, 0.97);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(0,0,0,0.6);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10;
        }
        .discover-back {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 9px 16px;
            border-radius: 8px;
            font: 600 14px 'Source Sans Pro';
            cursor: pointer;
            transition: background 0.15s;
        }
        .discover-back:hover { background: rgba(255,255,255,0.18); }
        .discover-header h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .discover-spacer { flex-grow: 1; }
        .discover-search {
            background: rgba(255,255,255,0.95);
            border: none;
            color: #333;
            padding: 9px 14px;
            border-radius: 8px;
            font: 500 14px 'Source Sans Pro';
            width: 280px;
            outline: none;
        }
        .discover-content {
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .featured-card {
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 28px;
            cursor: pointer;
            transition: transform 0.15s;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .featured-card:hover { transform: translateY(-2px); }
        .featured-thumb {
            width: 100%;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 36px;
            position: relative;
        }
        .featured-info {
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 24px 32px;
            border-radius: 14px;
            max-width: 480px;
        }
        .featured-info h1 {
            margin: 0 0 6px;
            font-size: 36px;
            font-weight: 800;
        }
        .featured-info p {
            margin: 0 0 16px;
            font-size: 14px;
            opacity: 0.85;
        }
        .featured-play {
            background: var(--rb-robux);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font: 800 16px 'Source Sans Pro';
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(76,217,100,0.4);
        }
        .featured-play:hover { filter: brightness(1.1); }
        .featured-emoji {
            position: absolute;
            right: 36px;
            bottom: 24px;
            font-size: 140px;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.3));
            transform: rotate(-8deg);
        }

        .discover-section { margin-bottom: 28px; }
        .disc-title {
            margin: 0 0 14px;
            font-size: 18px;
            font-weight: 700;
        }
        .disc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }
        .game-card {
            background: rgba(40, 40, 40, 0.85);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .game-card.soon { opacity: 0.75; }
        .game-thumb {
            width: 100%;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .game-emoji {
            font-size: 64px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .soon-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .play-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--rb-robux);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .game-info { padding: 12px 14px; }
        .game-title-2 {
            font: 700 15px 'Source Sans Pro';
            color: white;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .game-creator {
            color: #aaa;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .game-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #ccc;
        }

        /* === LOADING === */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--rb-bg-darker);
            display: flex;
            flex-direction: column;
            gap: 18px;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-size: 18px;
            font-weight: 600;
        }
        #loading-screen .loader {
            width: 52px; height: 52px;
            border: 4px solid rgba(255,255,255,0.12);
            border-top-color: var(--rb-blue-light);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* === 3D LABELS === */
        .chat-bubble-3d {
            background: white;
            border: 2px solid #000;
            border-radius: 10px;
            padding: 6px 12px;
            color: #111;
            font: 600 14px 'Source Sans Pro', Arial, sans-serif;
            max-width: 240px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 2px 0 rgba(0,0,0,0.25);
            position: relative;
        }
        .chat-bubble-3d::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 18px;
            width: 0; height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid white;
        }
        .chat-bubble-3d::before {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 16px;
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 12px solid #000;
        }
        .username-3d {
            background: var(--rb-blue-light);
            border: 2px solid rgba(0,0,0,0.55);
            border-radius: 4px;
            padding: 2px 10px;
            color: white;
            font: 700 13px 'Source Sans Pro', Arial, sans-serif;
            text-shadow: 0 1px 0 rgba(0,0,0,0.5);
            white-space: nowrap;
            box-shadow: 0 1px 0 rgba(0,0,0,0.3);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container">
        <div id="loading-screen">
            <div class="loader"></div>
            <div>Cargando Blox…</div>
        </div>
    </div>

    <!-- TOP BAR -->
    <div class="rb-topbar">
        <button class="rb-hamburger" id="rb-hamburger" title="Menú">
            <span></span><span></span><span></span>
        </button>
        <div class="rb-logo">blox</div>
        <div class="rb-search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" placeholder="Buscar juegos, gente, artículos..." />
        </div>
        <div class="rb-topbar-right">
            <div class="rb-robux" title="Tu saldo">
                <span id="money-amount">1,000</span>
                <span class="r$">R$</span>
            </div>
            <button class="rb-icon-btn" title="Amigos">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                <span class="badge">3</span>
            </button>
            <button class="rb-icon-btn" title="Notificaciones">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                <span class="badge">7</span>
            </button>
            <div class="rb-profile" title="Tu perfil">P</div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div class="rb-sidebar" id="rb-sidebar">
        <div class="sb-title">Menú</div>
        <button class="sb-item"><span class="ic">🏠</span>Inicio</button>
        <button class="sb-item"><span class="ic">🧭</span>Descubrir</button>
        <button class="sb-item"><span class="ic">🎮</span>Mis juegos</button>
        <button class="sb-item"><span class="ic">🛒</span>Mercado</button>
        <div class="sb-title" style="margin-top:16px;">Social</div>
        <button class="sb-item"><span class="ic">👤</span>Avatar</button>
        <button class="sb-item"><span class="ic">👥</span>Amigos</button>
        <button class="sb-item"><span class="ic">💬</span>Mensajes</button>
        <div class="sb-title" style="margin-top:16px;">Sistema</div>
        <button class="sb-item"><span class="ic">⚙️</span>Ajustes</button>
        <button class="sb-item"><span class="ic">❓</span>Ayuda</button>
    </div>

    <!-- IN-GAME UI -->
    <div class="game-ui">
        <button class="rb-menu-btn" id="rb-menu-btn">☰ Menú</button>

        <div class="game-menu" id="game-menu">
            <button class="gm-item" data-act="resume"><span class="ic">▶</span>Reanudar</button>
            <button class="gm-item" data-act="settings"><span class="ic">⚙</span>Ajustes del juego</button>
            <button class="gm-item" data-act="help"><span class="ic">?</span>Ayuda</button>
            <div class="gm-divider"></div>
            <button class="gm-item danger" data-act="leave"><span class="ic">⏏</span>Salir del juego</button>
        </div>

        <div class="game-title">
            <span id="game-title-text">Crossroads</span>
            <span class="ping">48 ms</span>
        </div>

        <div class="players-panel">
            <button class="players-toggle" id="players-toggle">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                Jugadores
                <span class="count" id="players-count">4</span>
            </button>
            <div class="players-list" id="players-list">
                <div class="pl-header">Conectados · 4</div>
                <div class="player-item"><span class="dot"></span><span class="name">Player_Clasic</span><span class="money" id="lb-money">1,000 R$</span></div>
                <div class="player-item"><span class="dot" style="background:#4cd964"></span><span class="name">Guest_2008</span><span class="money">50 R$</span></div>
                <div class="player-item"><span class="dot" style="background:#ff9500"></span><span class="name">xXBuilderXx</span><span class="money">12,400 R$</span></div>
                <div class="player-item"><span class="dot" style="background:#a64dff"></span><span class="name">NoobMaster</span><span class="money">3,250 R$</span></div>
            </div>
        </div>

        <button class="backpack-btn" id="backpack-btn" title="Mochila">
            <div class="slot"></div><div class="slot filled"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div><div class="slot filled"></div>
            <div class="slot"></div><div class="slot"></div><div class="slot"></div>
        </button>

        <div class="chat-container" id="chat-container">
            <div class="chat-window">
                <div class="chat-header">
                    <span>Chat</span>
                    <button class="close-btn" id="chat-close" title="Cerrar chat">×</button>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <div><b style="color:#1e90ff;">[Sistema]:</b> Bienvenido a <b>Blox</b> — servidor <b>Crossroads</b>.</div>
                </div>
                <input type="text" class="chat-input" id="chat-input" placeholder="Pulsa Enter para hablar..." maxlength="80" />
            </div>
            <button class="chat-toggle" id="chat-toggle">💬 Chat</button>
        </div>

        <div class="health-container">
            <div class="health-bar-bg">
                <div class="health-bar" id="health-fill" style="width:100%"></div>
                <div class="health-label"><span id="health-label">100/100</span></div>
            </div>
            <button class="respawn-btn" id="respawn-btn">↻ Respawn</button>
        </div>

        <div class="help-hint" id="help-hint">
            <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> moverse &nbsp;·&nbsp;
            <kbd>Espacio</kbd> saltar &nbsp;·&nbsp;
            <kbd>Enter</kbd> chat &nbsp;·&nbsp;
            <kbd>ESC</kbd> menú
        </div>
    </div>

    <!-- DISCOVER OVERLAY -->
    <div class="discover-overlay" id="discover-overlay">
        <div class="discover-header">
            <button class="discover-back" id="discover-back">← Volver al juego</button>
            <h2>Descubrir</h2>
            <div class="discover-spacer"></div>
            <input type="text" class="discover-search" id="discover-search" placeholder="🔍 Buscar juegos..." />
        </div>
        <div class="discover-content" id="discover-content">
            <!-- Cards built by JS -->
        </div>
    </div>

    <script type="module" src="gameHandler.js"></script>
    <script type="module" src="localScript.js"></script>
</body>
</html>
